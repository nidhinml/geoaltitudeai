version: '3.8'

services:
  backend:
    build: ./backend
    container_name: geoaltitude_backend
    expose:
      - "7860"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geoaltitude_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
