server {
    listen 80;
    server_name localhost;

    # Serve the React application
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend container
    location /api/ {
        # The backend service is named 'backend' in docker-compose.yml
        # The trailing slash ensures /api/foo is sent as /api/foo
        proxy_pass http://backend:7860/api/;
        
        # Header configurations
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Increase timeout for ML tasks
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Serve GeoJSON and other public assets without issues
    location ~* \.(geojson|json)$ {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin *;
    }
}
